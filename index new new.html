<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Desk</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14171b;
    --panel-2: #1b1f24;
    --line: #262b31;
    --text: #eef1f4;
    --text-dim: #8b929b;
    --accent: #d4af37;
    --accent-dim: #8a7227;
    --good: #3ddc84;
    --bad: #ff5c5c;
    --mono: 'SF Mono', 'Roboto Mono', monospace;
    --shadow: 0 8px 24px rgba(0,0,0,0.28);
  }

  [data-theme="light"] {
    --bg: #f4f2ec;
    --panel: #ffffff;
    --panel-2: #f0eee6;
    --line: #e2dfd4;
    --text: #1c1b18;
    --text-dim: #767468;
    --accent: #a87f0e;
    --accent-dim: #cdb05a;
    --good: #1f9e5c;
    --bad: #d6433f;
    --shadow: 0 8px 24px rgba(28,27,24,0.08);
  }

  html, body, .card, .ticker, .topbar, input, button {
    transition: background-color 0.35s ease, border-color 0.35s ease, color 0.35s ease;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100%;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
  }

  .topbar {
    padding: 14px 20px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    border-bottom: 1px solid var(--line);
  }

  .brand-row {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-self: start;
  }

  .brand-row .logo-img {
    height: 34px;
    width: auto;
  }

  .brand-row .logo-light { display: none; }
  .brand-row .logo-dark { display: block; }
  [data-theme="light"] .brand-row .logo-light { display: block; }
  [data-theme="light"] .brand-row .logo-dark { display: none; }

  .company-name {
    justify-self: center;
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text);
    font-weight: 600;
    white-space: nowrap;
  }

  .topbar .brand {
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }

  .topbar .clock {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
  }

  .topbar .right {
    display: flex;
    align-items: center;
    gap: 14px;
    justify-self: end;
  }

  .theme-toggle {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--panel-2);
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    color: var(--accent);
    font-size: 15px;
  }

  .theme-toggle svg {
    width: 16px;
    height: 16px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 2;
  }

  .icon-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--panel-2);
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    color: var(--accent);
    font-size: 15px;
    position: relative;
  }

  .icon-btn svg {
    width: 16px;
    height: 16px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 2;
  }

  .icon-btn .dot-badge {
    position: absolute;
    top: -2px;
    right: -2px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--bad);
    border: 2px solid var(--bg);
    display: none;
  }
  [data-theme="light"] .icon-btn .dot-badge { border-color: var(--bg); }
  .icon-btn .dot-badge.show { display: block; }

  .sidebar-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 40;
  }
  .sidebar-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .accounts-sidebar {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: min(360px, 88vw);
    background: var(--panel);
    border-left: 1px solid var(--line);
    box-shadow: -8px 0 24px rgba(0,0,0,0.3);
    transform: translateX(100%);
    transition: transform 0.3s ease;
    z-index: 41;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
  }
  .accounts-sidebar.open {
    transform: translateX(0);
  }

  .sidebar-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
  }

  .sidebar-head .title {
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text);
    font-weight: 700;
  }

  .sidebar-close {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    padding: 0;
  }

  .sidebar-body {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .account-row {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
  }

  .account-row .top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 8px;
  }

  .account-row .name {
    font-size: 14px;
    font-weight: 700;
    text-transform: capitalize;
    color: var(--text);
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .account-row .pct {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .account-row .bar-track {
    height: 8px;
    border-radius: 5px;
    background: var(--line);
    overflow: hidden;
  }

  .account-row .bar-fill {
    height: 100%;
    border-radius: 5px;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  .account-row .bar-fill.over {
    background: var(--bad);
  }

  .account-row .figures {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  .account-row .figures .left-amount {
    color: var(--good);
    font-weight: 700;
  }

  .account-row .figures .left-amount.over {
    color: var(--bad);
  }

  .sidebar-refresh {
    margin: 10px 16px 0;
    background: none;
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 8px 0;
    border-radius: 8px;
  }

  .ticker {
    display: flex;
    overflow: hidden;
    white-space: nowrap;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
  }

  .ticker-track {
    display: flex;
    animation: scroll 22s linear infinite;
    padding: 8px 0;
  }

  .ticker-item {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    padding: 0 18px;
    border-right: 1px solid var(--line);
    flex-shrink: 0;
  }

  @keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  main {
    flex: 1;
    padding: 18px 16px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 520px;
    width: 100%;
    margin: 0 auto;
    min-width: 0;
    overflow-x: hidden;
  }

  .markets-strip {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 6px;
  }

  .market-tile {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px 4px;
    text-align: center;
    box-shadow: var(--shadow);
    min-width: 0;
    overflow: hidden;
  }

  .market-tile .sym {
    font-size: 9px;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .market-tile .val {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    line-height: 1.15;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .market-tile .chg {
    font-family: var(--mono);
    font-size: 9px;
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .market-tile .chg.up { color: var(--good); }
  .market-tile .chg.down { color: var(--bad); }

  .section-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 16px;
    min-width: 0;
  }

  @media (max-width: 460px) {
    .section-row { grid-template-columns: 1fr; }
  }

  .section-label {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::before {
    content: '';
    width: 3px;
    height: 12px;
    background: var(--accent);
    display: inline-block;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    box-shadow: var(--shadow);
    animation: rise 0.4s ease both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  main > div:nth-child(1) .card { animation-delay: 0.02s; }
  main > div:nth-child(2) .card { animation-delay: 0.07s; }
  main > div:nth-child(3) .card { animation-delay: 0.12s; }
  main > div:nth-child(4) .card { animation-delay: 0.17s; }

  .rate-input-row {
    display: flex;
    gap: 10px;
    min-width: 0;
  }

  input[type="text"] {
    flex: 1;
    min-width: 0;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 600;
    padding: 14px 8px;
    text-align: center;
    letter-spacing: 0.01em;
    -webkit-appearance: none;
    width: 100%;
  }

  input[type="text"]:focus {
    outline: none;
    border-color: var(--accent-dim);
  }

  input[type="text"]::placeholder {
    color: var(--text-dim);
    opacity: 0.6;
  }

  button {
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.08s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    -webkit-appearance: none;
  }

  button:active {
    transform: scale(0.97);
  }

  .btn-send {
    background: var(--accent);
    color: #15130a;
    font-size: 16px;
    padding: 16px 22px;
    white-space: nowrap;
    box-shadow: 0 4px 14px rgba(212,175,55,0.25);
  }

  [data-theme="light"] .btn-send {
    box-shadow: 0 4px 14px rgba(168,127,14,0.2);
  }

  .btn-send:disabled {
    opacity: 0.5;
    transform: none;
  }

  .btn-balance {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    font-size: 16px;
    padding: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-balance:active {
    background: #21262d;
  }

  .pulse-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
  }

  .pulse-dot.live {
    background: var(--good);
    box-shadow: 0 0 0 0 rgba(61,220,132,0.5);
    animation: pulse 1.6s ease-out infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(61,220,132,0.45); }
    70% { box-shadow: 0 0 0 6px rgba(61,220,132,0); }
    100% { box-shadow: 0 0 0 0 rgba(61,220,132,0); }
  }

  .status-line {
    margin-top: 14px;
    font-family: var(--mono);
    font-size: 14px;
    min-height: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .status-line.show { opacity: 1; }
  .status-line.ok { color: var(--good); }
  .status-line.err { color: var(--bad); }
  .status-line.pending { color: var(--text-dim); }

  .spinner {
    width: 13px;
    height: 13px;
    border: 2px solid var(--line);
    border-top-color: var(--text-dim);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .balance-display {
    text-align: center;
    padding: 6px 0 2px;
  }

  .balance-display .figure {
    font-family: var(--mono);
    font-size: clamp(22px, 8vw, 42px);
    font-weight: 700;
    letter-spacing: -0.02em;
    word-break: break-all;
    overflow-wrap: break-word;
  }

  .balance-display .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .balance-display.good .figure { color: var(--good); }
  .balance-display.bad .figure { color: var(--bad); }

  .summary-card {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 0;
  }

  .summary-stat {
    text-align: center;
    padding: 4px 4px;
    border-right: 1px solid var(--line);
    min-width: 0;
    overflow: hidden;
  }

  .summary-stat:last-child { border-right: none; }

  .summary-stat .num {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .summary-stat .lbl {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .recent-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .recent-row {
    display: flex;
    justify-content: space-between;
    padding: 11px 4px;
    border-bottom: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 13px;
  }

  .recent-row:last-child { border-bottom: none; }

  .recent-row .t { color: var(--text-dim); }
  .recent-row .v { color: var(--text); }

  .empty-note {
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 10px 0;
  }

  .price-list {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--text);
    max-height: 360px;
    overflow-y: auto;
    direction: rtl;
    text-align: right;
  }

  .price-list .blank-line {
    height: 4px;
  }

  .btn-copy {
    background: none;
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 5px 12px;
    border-radius: 7px;
  }

  .btn-copy.copied {
    border-color: var(--good);
    color: var(--good);
  }

  footer {
    text-align: center;
    padding: 18px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  @media (prefers-reduced-motion: reduce) {
    .ticker-track { animation: none; }
    .spinner { animation: none; }
    .accounts-sidebar { transition: none; }
    .sidebar-overlay { transition: none; }
  }
</style>
</head>

<script>
  const ENDPOINT = "https://script.google.com/macros/s/AKfycbxqxHdQIv9p_UWRenGkid_aK2XvK7MsEX8Zll2ztbDm_TgJic541XmlpNgVCRHEsN46Kw/exec";
  const ACCOUNTS_ENDPOINT = "https://script.google.com/macros/s/AKfycbyHnVXN6xHC7w6r9f57BedFc6P0QYcnba87Lmn7yt_kYSsC6OJpYDTQM_85_m1xsexOAg/exec";

  // Theme — defaults to dark, remembers choice
  const sunIcon = '<path d="M12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10z"/><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/>';
  const moonIcon = '<path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.39 5.39 0 0 1-7.14-7.14A8.96 8.96 0 0 0 12 3z"/>';
  const themeIcon = document.getElementById('themeIcon');
  const themeToggle = document.getElementById('themeToggle');

  function applyTheme(theme) {
    if (theme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      themeIcon.innerHTML = sunIcon;
    } else {
      document.documentElement.removeAttribute('data-theme');
      themeIcon.innerHTML = moonIcon;
    }
  }

  let currentTheme = localStorage.getItem('desk-theme') || 'dark';
  applyTheme(currentTheme);

  themeToggle.addEventListener('click', () => {
    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('desk-theme', currentTheme);
    applyTheme(currentTheme);
  });

  // Clock
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('clock').textContent = h + ':' + m;
  }
  updateClock();
  setInterval(updateClock, 1000 * 15);

  // Live markets — gold, silver, EUR/USD, BTC. Entirely separate from the Google Sheet.
  const track = document.getElementById('tickerTrack');
  const marketsStrip = document.getElementById('marketsStrip');
  let marketData = { gold: null, silver: null, eur: null, btc: null };

  function fmtChg(chp) {
    if (chp === null || chp === undefined || isNaN(chp)) return { text: '—', cls: '' };
    const up = chp >= 0;
    return { text: `${up ? '▲' : '▼'} ${Math.abs(chp).toFixed(2)}%`, cls: up ? 'up' : 'down' };
  }

  function renderMarkets() {
    const tiles = [
      { sym: 'Gold', val: marketData.gold ? `$${Math.round(marketData.gold.price).toLocaleString('en-US')}` : '—', chg: marketData.gold ? fmtChg(marketData.gold.chp) : null },
      { sym: 'Silver', val: marketData.silver ? `$${marketData.silver.price.toFixed(2)}` : '—', chg: marketData.silver ? fmtChg(marketData.silver.chp) : null },
      { sym: 'EUR/USD', val: marketData.eur ? marketData.eur.toFixed(4) : '—', chg: null },
      { sym: 'BTC', val: marketData.btc ? `$${Math.round(marketData.btc).toLocaleString('en-US')}` : '—', chg: null }
    ];
    marketsStrip.innerHTML = tiles.map(t => `
      <div class="market-tile">
        <div class="sym">${t.sym}</div>
        <div class="val">${t.val}</div>
        <div class="chg ${t.chg ? t.chg.cls : ''}">${t.chg ? t.chg.text : '&nbsp;'}</div>
      </div>
    `).join('');

    const tickerItems = [];
    if (marketData.gold) tickerItems.push(`GOLD $${Math.round(marketData.gold.price).toLocaleString('en-US')}/OZ ${fmtChg(marketData.gold.chp).text}`);
    if (marketData.silver) tickerItems.push(`SILVER $${marketData.silver.price.toFixed(2)}/OZ ${fmtChg(marketData.silver.chp).text}`);
    if (marketData.eur) tickerItems.push(`EUR/USD ${marketData.eur.toFixed(4)}`);
    if (marketData.btc) tickerItems.push(`BTC $${Math.round(marketData.btc).toLocaleString('en-US')}`);
    if (tickerItems.length === 0) tickerItems.push('LOADING MARKETS…');
    track.innerHTML = tickerItems.concat(tickerItems).map(m => `<div class="ticker-item">${m}</div>`).join('');
  }
  renderMarkets();

  async function fetchMarkets() {
    try {
      const [goldRes, silverRes, eurRes, btcRes] = await Promise.allSettled([
        fetch('https://api.gold-api.com/price/XAU').then(r => r.json()),
        fetch('https://api.gold-api.com/price/XAG').then(r => r.json()),
        fetch('https://open.er-api.com/v6/latest/EUR').then(r => r.json()),
        fetch('https://api.coinbase.com/v2/prices/BTC-USD/spot').then(r => r.json())
      ]);
      if (goldRes.status === 'fulfilled') marketData.gold = goldRes.value;
      if (silverRes.status === 'fulfilled') marketData.silver = silverRes.value;
      if (eurRes.status === 'fulfilled' && eurRes.value.rates) marketData.eur = eurRes.value.rates.USD;
      if (btcRes.status === 'fulfilled' && btcRes.value.data) marketData.btc = parseFloat(btcRes.value.data.amount);
      renderMarkets();
    } catch (err) {
      // Leave last known values in place
    }
  }
  fetchMarkets();
  setInterval(fetchMarkets, 1000 * 30);

  // BTC moves fast enough that a tighter poll is worth it; metals/FX don't.
  async function fetchBtcOnly() {
    try {
      const res = await fetch('https://api.coinbase.com/v2/prices/BTC-USD/spot');
      const data = await res.json();
      if (data.data) {
        marketData.btc = parseFloat(data.data.amount);
        renderMarkets();
      }
    } catch (err) { /* keep last known value */ }
  }
  setInterval(fetchBtcOnly, 1000 * 8);

  // Today summary — tracks this session's own activity
  const todaySummary = { rates: 0, checks: 0, lastAction: null };
  function renderSummary() {
    document.getElementById('statRates').textContent = todaySummary.rates;
    document.getElementById('statChecks').textContent = todaySummary.checks;
    document.getElementById('statLast').textContent = todaySummary.lastAction || '—';
  }

  const recent = [];
  function pushRecent(label, value) {
    const now = new Date();
    const time = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    recent.unshift({ time, label, value });
    if (recent.length > 6) recent.pop();
    if (label === 'Rate') todaySummary.rates++;
    if (label === 'Balance') todaySummary.checks++;
    todaySummary.lastAction = time;
    renderSummary();
    renderRecent();
  }
  function renderRecent() {
    const list = document.getElementById('recentList');
    if (recent.length === 0) {
      list.innerHTML = '<div class="empty-note">Nothing sent yet this session</div>';
      return;
    }
    list.innerHTML = recent.map(r => `
      <div class="recent-row">
        <span class="t">${r.time} · ${r.label}</span>
        <span class="v">${r.value}</span>
      </div>
    `).join('');
  }

  function setStatus(el, text, kind) {
    el.textContent = text;
    el.className = 'status-line show ' + kind;
  }
  function clearStatusLater(el, delay) {
    setTimeout(() => { el.classList.remove('show'); }, delay);
  }

  // Rate submit
  const rateInput = document.getElementById('rateInput');
  const sendRateBtn = document.getElementById('sendRateBtn');
  const rateStatus = document.getElementById('rateStatus');

  let lastListText = '';
  const copyListBtn = document.getElementById('copyListBtn');

  async function fetchAndShowPriceList() {
    const box = document.getElementById('priceListBox');
    box.innerHTML = '<div class="empty-note">Loading…</div>';
    copyListBtn.style.display = 'none';
    try {
      const res = await fetch(`${ENDPOINT}?action=getList`);
      const data = await res.json();
      if (data.ok && data.lines) {
        lastListText = data.lines.join('\n');
        box.innerHTML = '<div class="price-list">' + data.lines.map(line =>
          line === '' ? '<div class="blank-line"></div>' : escapeHtml(line)
        ).join('\n') + '</div>';
        copyListBtn.style.display = 'inline-block';
        copyListBtn.textContent = 'Copy';
        copyListBtn.classList.remove('copied');
      } else {
        box.innerHTML = '<div class="empty-note">Could not load the list</div>';
      }
    } catch (err) {
      box.innerHTML = '<div class="empty-note">Could not reach the sheet</div>';
    }
  }

  copyListBtn.addEventListener('click', async () => {
    if (!lastListText) return;
    try {
      await navigator.clipboard.writeText(lastListText);
    } catch (err) {
      // Fallback for older browsers / non-secure contexts
      const tmp = document.createElement('textarea');
      tmp.value = lastListText;
      tmp.style.position = 'fixed';
      tmp.style.opacity = '0';
      document.body.appendChild(tmp);
      tmp.select();
      document.execCommand('copy');
      document.body.removeChild(tmp);
    }
    copyListBtn.textContent = 'Copied ✓';
    copyListBtn.classList.add('copied');
    setTimeout(() => {
      copyListBtn.textContent = 'Copy';
      copyListBtn.classList.remove('copied');
    }, 2000);
  });

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function sendRate() {
    const value = rateInput.value.trim();
    if (!value || isNaN(value)) {
      setStatus(rateStatus, 'Enter a number first', 'err');
      clearStatusLater(rateStatus, 2500);
      return;
    }
    sendRateBtn.disabled = true;
    setStatus(rateStatus, 'Sending…', 'pending');
    try {
      const res = await fetch(`${ENDPOINT}?action=rate&value=${encodeURIComponent(value)}`);
      const data = await res.json();
      if (data.ok) {
        setStatus(rateStatus, '✓ ' + data.message, 'ok');
        pushRecent('Rate', value);
        rateInput.value = '';
        fetchAndShowPriceList();
      } else {
        setStatus(rateStatus, data.message || 'Something went wrong', 'err');
      }
    } catch (err) {
      setStatus(rateStatus, 'Could not reach the sheet — check connection', 'err');
    } finally {
      sendRateBtn.disabled = false;
      clearStatusLater(rateStatus, 4000);
    }
  }

  sendRateBtn.addEventListener('click', sendRate);
  rateInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendRate(); });

  // Balance check
  const checkBalanceBtn = document.getElementById('checkBalanceBtn');
  const balanceBtnText = document.getElementById('balanceBtnText');
  const balanceDot = document.getElementById('balanceDot');
  const balanceStatus = document.getElementById('balanceStatus');
  const balanceDisplay = document.getElementById('balanceDisplay');
  const balanceFigure = document.getElementById('balanceFigure');
  const balanceLabel = document.getElementById('balanceLabel');

  async function checkBalance() {
    checkBalanceBtn.disabled = true;
    balanceBtnText.textContent = 'Checking…';
    try {
      const res = await fetch(`${ENDPOINT}?action=balance`);
      const data = await res.json();
      if (data.ok) {
        balanceDisplay.style.display = 'block';
        balanceDisplay.className = 'balance-display ' + (data.oversold ? 'bad' : 'good');
        balanceFigure.textContent = data.amount;
        balanceLabel.textContent = data.oversold ? 'Oversold — need to buy more' : 'Remaining capacity';
        balanceDot.classList.add('live');
        pushRecent('Balance', data.amount);
      } else {
        setStatus(balanceStatus, data.message || 'Could not read balance', 'err');
        clearStatusLater(balanceStatus, 3500);
      }
    } catch (err) {
      setStatus(balanceStatus, 'Could not reach the sheet — check connection', 'err');
      clearStatusLater(balanceStatus, 3500);
    } finally {
      checkBalanceBtn.disabled = false;
      balanceBtnText.textContent = 'Check balance';
    }
  }

  checkBalanceBtn.addEventListener('click', checkBalance);

  // ---------- Accounts sidebar ("barrel" balances) ----------
  // Pulls from a separate, standalone Apps Script bound only to the
  // Kharid rooz (buy) sheet — kept completely independent from ENDPOINT
  // above so this never touches the Telegram bot's script.
  const accountsToggle = document.getElementById('accountsToggle');
  const accountsBadge = document.getElementById('accountsBadge');
  const sidebarOverlay = document.getElementById('sidebarOverlay');
  const accountsSidebar = document.getElementById('accountsSidebar');
  const sidebarClose = document.getElementById('sidebarClose');
  const sidebarRefresh = document.getElementById('sidebarRefresh');
  const accountsList = document.getElementById('accountsList');

  function fmtAmount(n) {
    n = Number(n) || 0;
    return Math.round(n).toLocaleString('en-US');
  }

  function renderAccounts(accounts) {
    if (!accounts || accounts.length === 0) {
      accountsList.innerHTML = '<div class="empty-note">No open accounts right now</div>';
      accountsBadge.classList.remove('show');
      return;
    }

    let anyOversold = false;

    accountsList.innerHTML = accounts.map(acc => {
      const total = Number(acc.total) || 0;
      const allocated = Number(acc.allocated) || 0;
      const remaining = Number(acc.remaining);
      const pctFilled = total > 0 ? Math.min(100, Math.max(0, (allocated / total) * 100)) : 0;
      const isOver = remaining < 0;
      if (isOver) anyOversold = true;

      return `
        <div class="account-row">
          <div class="top">
            <span class="name">${escapeHtml(acc.name)}</span>
            <span class="pct">${pctFilled.toFixed(0)}%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill ${isOver ? 'over' : ''}" style="width:${Math.min(100, pctFilled)}%"></div>
          </div>
          <div class="figures">
            <span>${fmtAmount(allocated)} / ${fmtAmount(total)} filled</span>
            <span class="left-amount ${isOver ? 'over' : ''}">${isOver ? fmtAmount(Math.abs(remaining)) + ' over' : fmtAmount(remaining) + ' left'}</span>
          </div>
        </div>
      `;
    }).join('');

    accountsBadge.classList.toggle('show', anyOversold);
  }

  async function fetchAccounts() {
    accountsList.innerHTML = '<div class="empty-note">Loading accounts…</div>';
    try {
      const res = await fetch(ACCOUNTS_ENDPOINT);
      const data = await res.json();
      if (data.ok) {
        renderAccounts(data.accounts);
      } else {
        accountsList.innerHTML = '<div class="empty-note">Could not load accounts</div>';
      }
    } catch (err) {
      accountsList.innerHTML = '<div class="empty-note">Could not reach the sheet — check connection</div>';
    }
  }

  function openSidebar() {
    accountsSidebar.classList.add('open');
    sidebarOverlay.classList.add('open');
    fetchAccounts();
  }

  function closeSidebar() {
    accountsSidebar.classList.remove('open');
    sidebarOverlay.classList.remove('open');
  }

  accountsToggle.addEventListener('click', openSidebar);
  sidebarClose.addEventListener('click', closeSidebar);
  sidebarOverlay.addEventListener('click', closeSidebar);
  sidebarRefresh.addEventListener('click', fetchAccounts);

  // Quiet background check on load so the badge can flag an oversold
  // account even before the person opens the sidebar.
  fetchAccounts();
</script>

</body>
</html>
